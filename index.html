<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UX Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 2.5rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 800px;
    }
    a.card {
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a.card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    a.card h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    a.card p { font-size: 0.9rem; color: #888; margin: 0; }
  </style>
</head>
<body>
  <h1>UX Portfolio</h1>
  <p>Case Studies</p>
  <div class="grid">
    <a class="card" href="send-money-imt-case-study.html">
      <h2>Send Money — IMT</h2>
      <p>International Money Transfer case study</p>
    </a>
    <a class="card" href="ux-baseline-case-study.html">
      <h2>UX Baseline</h2>
      <p>UX baseline evaluation case study</p>
    </a>
  </div>
</body>
</html>
